<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Audit then fix research arc</title>
  <desc id="desc">The lab moved from V3 closeout to V4 schema leak, V4B neutral slots, V5 paired ablation, V5B neutral no exclude, and V5C named with exclude.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .ink { fill: #17202a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #58636f; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .node { fill: #ffffff; stroke: #26343f; stroke-width: 2; rx: 14; }
      .arrow { stroke: #26343f; stroke-width: 3; marker-end: url(#arrow); }
      .title { font-size: 42px; font-weight: 800; }
      .step { font-size: 22px; font-weight: 800; }
      .body { font-size: 16px; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#26343f"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="360"/>
  <text x="56" y="62" class="ink title">Audit-Then-Fix Arc</text>
  <text x="58" y="96" class="muted body">The public result is the final cell plus the trail showing how earlier claims were narrowed.</text>

  <rect x="50" y="145" width="130" height="110" class="node"/>
  <rect x="205" y="145" width="130" height="110" class="node"/>
  <rect x="360" y="145" width="130" height="110" class="node"/>
  <rect x="515" y="145" width="130" height="110" class="node"/>
  <rect x="670" y="145" width="130" height="110" class="node"/>
  <rect x="825" y="145" width="130" height="110" class="node"/>

  <line x1="180" y1="200" x2="205" y2="200" class="arrow"/>
  <line x1="335" y1="200" x2="360" y2="200" class="arrow"/>
  <line x1="490" y1="200" x2="515" y2="200" class="arrow"/>
  <line x1="645" y1="200" x2="670" y2="200" class="arrow"/>
  <line x1="800" y1="200" x2="825" y2="200" class="arrow"/>

  <text x="115" y="185" text-anchor="middle" class="ink step">V3</text>
  <text x="115" y="217" text-anchor="middle" class="muted body">closed as</text>
  <text x="115" y="237" text-anchor="middle" class="muted body">CoVe-like</text>

  <text x="270" y="185" text-anchor="middle" class="ink step">V4</text>
  <text x="270" y="217" text-anchor="middle" class="muted body">schema leak</text>
  <text x="270" y="237" text-anchor="middle" class="muted body">found</text>

  <text x="425" y="185" text-anchor="middle" class="ink step">V4B</text>
  <text x="425" y="217" text-anchor="middle" class="muted body">neutral slots</text>
  <text x="425" y="237" text-anchor="middle" class="muted body">0/36</text>

  <text x="580" y="185" text-anchor="middle" class="ink step">V5</text>
  <text x="580" y="217" text-anchor="middle" class="muted body">paired</text>
  <text x="580" y="237" text-anchor="middle" class="muted body">10/36 vs 0/36</text>

  <text x="735" y="185" text-anchor="middle" class="ink step">V5B</text>
  <text x="735" y="217" text-anchor="middle" class="muted body">neutral no</text>
  <text x="735" y="237" text-anchor="middle" class="muted body">exclude: 0/36</text>

  <text x="890" y="185" text-anchor="middle" class="ink step">V5C</text>
  <text x="890" y="217" text-anchor="middle" class="muted body">named with</text>
  <text x="890" y="237" text-anchor="middle" class="muted body">exclude: 14/36</text>

  <text x="56" y="318" class="muted body">Each step answered the strongest current objection before the claim was widened.</text>
</svg>
