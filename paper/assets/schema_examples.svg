<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Named schema slots versus neutral schema slots</title>
  <desc id="desc">Examples of named fields like study name and advisory ID compared with neutral fields like pattern and mechanism.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .ink { fill: #17202a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #5d6975; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .panel { fill: #ffffff; stroke: #d7d1c8; stroke-width: 2; rx: 18; }
      .bad { fill: #fff0e8; stroke: #d97b55; stroke-width: 2; rx: 12; }
      .good { fill: #edf8f3; stroke: #5da98b; stroke-width: 2; rx: 12; }
      .chipText { font-size: 24px; font-weight: 700; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .big { font-size: 46px; font-weight: 800; }
      .label { font-size: 28px; font-weight: 800; }
      .body { font-size: 22px; }
      .small { font-size: 18px; }
    </style>
  </defs>
  <rect class="bg" width="980" height="520"/>
  <text x="56" y="62" class="ink big">What Changed?</text>
  <text x="58" y="98" class="muted body">The prompt body stayed clean. The output field labels changed.</text>

  <rect x="56" y="136" width="412" height="316" class="panel"/>
  <rect x="512" y="136" width="412" height="316" class="panel"/>

  <text x="86" y="184" class="ink label">Named artifact slots</text>
  <text x="542" y="184" class="ink label">Neutral descriptive slots</text>
  <text x="86" y="220" class="muted small">These imply a named thing should exist.</text>
  <text x="542" y="220" class="muted small">These ask for properties, not artifacts.</text>

  <rect x="86" y="250" width="250" height="44" class="bad"/>
  <text x="108" y="280" class="ink chipText">study_name</text>
  <rect x="86" y="308" width="278" height="44" class="bad"/>
  <text x="108" y="338" class="ink chipText">rule_identifier</text>
  <rect x="86" y="366" width="258" height="44" class="bad"/>
  <text x="108" y="396" class="ink chipText">advisory_id</text>

  <rect x="542" y="250" width="174" height="44" class="good"/>
  <text x="564" y="280" class="ink chipText">pattern</text>
  <rect x="542" y="308" width="210" height="44" class="good"/>
  <text x="564" y="338" class="ink chipText">mechanism</text>
  <rect x="542" y="366" width="272" height="44" class="good"/>
  <text x="564" y="396" class="ink chipText">uncertainty</text>

  <text x="56" y="492" class="muted small">Hypothesis: field labels are not inert developer metadata. They are part of the prompt.</text>
</svg>
